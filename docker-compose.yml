services:
  sitl:
    build:
      context: .
      dockerfile: Dockerfile.sitl
    expose:
      - "5760"
      - "5770"
      - "5780"
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SITL_HOST: sitl
    volumes:
      - ./app:/app/app
      - ./frontend:/app/frontend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - sitl
    restart: unless-stopped
